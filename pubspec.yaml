name: bantay_daan
description: Report. Track. Resolve.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Camera & Location
  image_picker: ^1.0.7
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  http: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
